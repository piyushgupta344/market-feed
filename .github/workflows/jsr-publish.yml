name: Publish to JSR

# Triggers on both tag formats:
#   market-feed@<version>  — manually pushed JSR tags
#   v<version>             — automatically created by Changesets after npm publish
on:
  push:
    tags:
      - "market-feed@*"
      - "v[0-9]*"

jobs:
  publish:
    name: Publish to JSR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for JSR OIDC authentication

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Sync jsr.json version from the git tag
      # Handles both "market-feed@1.2.0" and "v1.2.0" formats
      - name: Sync version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#market-feed@}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('jsr.json', 'utf8'));
            cfg.version = '$VERSION';
            fs.writeFileSync('jsr.json', JSON.stringify(cfg, null, 2) + '\n');
          "

      # Publish TypeScript source directly — JSR compiles it natively.
      # --allow-slow-types lets us skip explicit return types on re-exports.
      - name: Publish to JSR
        run: npx jsr publish --allow-slow-types
