name: Publish to JSR

# Manual override: push a "market-feed@<version>" tag to publish a specific
# version to JSR without triggering a full npm release.
# Automatic JSR publishing for npm releases is handled in release.yml.
on:
  push:
    tags:
      - "market-feed@*"

jobs:
  publish:
    name: Publish to JSR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for JSR OIDC authentication

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Sync jsr.json version from the git tag (format: "market-feed@1.2.0")
      - name: Sync version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#market-feed@}"
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('jsr.json', 'utf8'));
            cfg.version = '$VERSION';
            fs.writeFileSync('jsr.json', JSON.stringify(cfg, null, 2) + '\n');
          "

      - name: Publish to JSR
        run: npx jsr publish
